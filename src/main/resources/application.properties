spring.application.name=ibm-springboot-demo

server.port=8090

# --- MongoDB ---
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=ibm-ems
spring.data.mongodb.auto-index-creation=true

# --- JWT ---
# Secret key \u2014 must be at least 256 bits (32 characters) for HS256 algorithm
# In production: store in environment variable or vault, never hardcode
app.jwt.secret=ibm-demo-secret-key-must-be-at-least-256-bits-long-for-hs256
# Token expiry in milliseconds: 86400000 = 24 hours
app.jwt.expiration=86400000

